<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureZip</title>
<script src="https://unpkg.com/@zip.js/zip.js@2.7.52/dist/zip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:480px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
h1{font-size:22px;font-weight:700;color:#1d1d1f;margin-bottom:4px}
.subtitle{font-size:13px;color:#86868b;margin-bottom:24px}
.drop-zone{border:2px dashed #d2d2d7;border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:16px}
.drop-zone:hover,.drop-zone.drag-over{border-color:#0071e3;background:#f0f7ff}
.drop-zone .icon{font-size:36px;margin-bottom:8px}
.drop-zone .main{font-size:15px;font-weight:500;color:#1d1d1f}
.drop-zone .sub{font-size:12px;color:#86868b;margin-top:4px}
#fileInput{display:none}
.file-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;max-height:160px;overflow-y:auto}
.file-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f5f5f7;border-radius:10px;font-size:13px}
.file-item .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1d1d1f}
.file-item .fsize{color:#86868b;font-size:11px;flex-shrink:0}
.file-item .del{background:none;border:none;cursor:pointer;color:#86868b;font-size:16px;padding:0 2px;line-height:1}
.file-item .del:hover{color:#ff3b30}
.field{margin-bottom:14px}
.field label{font-size:13px;font-weight:500;color:#1d1d1f;display:block;margin-bottom:6px}
.field input{width:100%;height:42px;border:1.5px solid #d2d2d7;border-radius:10px;padding:0 14px;font-size:14px;outline:none;transition:border-color 0.2s;color:#1d1d1f;background:#fff}
.field input:focus{border-color:#0071e3}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#86868b;font-size:18px;line-height:1}
.strength{display:flex;gap:4px;margin-top:8px}
.bar{height:3px;flex:1;border-radius:2px;background:#e5e5ea;transition:background 0.2s}
.slabel{font-size:11px;color:#86868b;margin-top:4px}
.btn{width:100%;height:44px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:#0071e3;color:#fff}
.btn-primary:hover{background:#0077ed}
.btn-primary:disabled{background:#b0c8f0;cursor:not-allowed}
.btn-secondary{background:#f5f5f7;color:#1d1d1f;margin-top:10px}
.btn-secondary:hover{background:#e5e5ea}
.progress-wrap{margin:16px 0}
.progress-bar-bg{height:6px;background:#e5e5ea;border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:#0071e3;border-radius:3px;transition:width 0.3s;width:0%}
.progress-text{font-size:12px;color:#86868b;margin-top:6px;text-align:center}
.success-box{text-align:center;padding:16px 0}
.success-box .check{font-size:48px;margin-bottom:8px}
.success-box .msg{font-size:16px;font-weight:600;color:#1d1d1f;margin-bottom:4px}
.success-box .info{font-size:13px;color:#86868b;margin-bottom:20px}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <h1>🔐 SecureZip</h1>
  <p class="subtitle">브라우저에서 바로 — 설치 없이 암호 압축</p>

  <div id="mainView">
    <div class="drop-zone" id="dropZone">
      <div class="icon">📁</div>
      <div class="main">파일을 여기에 드래그하거나 클릭해서 선택</div>
      <div class="sub">아이폰 · 아이패드 · PC 모두 지원</div>
    </div>
    <input type="file" id="fileInput" multiple>

    <div class="file-list" id="fileList"></div>

    <div class="field">
      <label>ZIP 파일 이름</label>
      <input type="text" id="zipName" value="archive" placeholder="archive">
    </div>

    <div class="field">
      <label>암호 (선택사항)</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="암호를 입력하세요">
        <button class="pw-toggle" id="pwToggle">👁</button>
      </div>
      <div class="strength" id="strengthBars">
        <div class="bar" id="b1"></div>
        <div class="bar" id="b2"></div>
        <div class="bar" id="b3"></div>
        <div class="bar" id="b4"></div>
      </div>
      <div class="slabel" id="strengthLabel"></div>
    </div>

    <div id="progressWrap" class="progress-wrap hidden">
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-text" id="progressText">압축 중...</div>
    </div>

    <button class="btn btn-primary" id="compressBtn" disabled>
      📦 압축하기
    </button>
  </div>

  <div id="successView" class="hidden">
    <div class="success-box">
      <div class="check">✅</div>
      <div class="msg">압축 완료!</div>
      <div class="info" id="successInfo"></div>
      <button class="btn btn-primary" id="downloadBtn">⬇️ 다운로드</button>
      <button class="btn btn-secondary" id="resetBtn">🔄 처음으로</button>
    </div>
  </div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const password = document.getElementById('password');
const pwToggle = document.getElementById('pwToggle');
const compressBtn = document.getElementById('compressBtn');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const mainView = document.getElementById('mainView');
const successView = document.getElementById('successView');
const successInfo = document.getElementById('successInfo');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');

let files = [];
let zipBlob = null;

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', e => addFiles([...e.target.files]));

function addFiles(newFiles) {
  newFiles.forEach(f => { if (!files.find(x => x.name === f.name)) files.push(f); });
  renderFiles();
}

function renderFiles() {
  fileList.innerHTML = '';
  files.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `<span class="fname">📄 ${f.name}</span><span class="fsize">${formatSize(f.size)}</span><button class="del" data-i="${i}">✕</button>`;
    fileList.appendChild(item);
  });
  fileList.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', () => { files.splice(+btn.dataset.i, 1); renderFiles(); });
  });
  compressBtn.disabled = files.length === 0;
}

function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

pwToggle.addEventListener('click', () => {
  password.type = password.type === 'password' ? 'text' : 'password';
  pwToggle.textContent = password.type === 'password' ? '👁' : '🙈';
});

password.addEventListener('input', () => {
  const v = password.value;
  const bars = [document.getElementById('b1'),document.getElementById('b2'),document.getElementById('b3'),document.getElementById('b4')];
  const label = document.getElementById('strengthLabel');
  let score = 0;
  if (v.length >= 6) score++;
  if (v.length >= 10) score++;
  if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const colors = ['#ff3b30','#ff9500','#34c759','#0071e3'];
  const labels = ['','약함','보통','강함','매우 강함'];
  bars.forEach((b, i) => { b.style.background = i < score ? colors[score-1] : '#e5e5ea'; });
  label.textContent = v.length > 0 ? labels[score] : '';
});

compressBtn.addEventListener('click', async () => {
  if (files.length === 0) return;
  compressBtn.disabled = true;
  progressWrap.classList.remove('hidden');
  progressBar.style.width = '0%';
  progressText.textContent = '압축 준비 중...';

  try {
    const pw = password.value;
    const zipName = (document.getElementById('zipName').value || 'archive').replace(/\.zip$/i,'') + '.zip';

    const { ZipWriter, BlobWriter, BlobReader } = zip;
    const zipWriter = new ZipWriter(new BlobWriter('application/zip'), {
      password: pw || undefined,
      encryptionStrength: pw ? 3 : undefined
    });

    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      progressText.textContent = `압축 중... ${f.name}`;
      progressBar.style.width = Math.round((i / files.length) * 80) + '%';
      await zipWriter.add(f.name, new BlobReader(f));
    }

    progressBar.style.width = '95%';
    progressText.textContent = '마무리 중...';
    zipBlob = await zipWriter.close();
    progressBar.style.width = '100%';

    const totalSize = files.reduce((s, f) => s + f.size, 0);
    successInfo.textContent = `${files.length}개 파일 · ${formatSize(totalSize)} → ${formatSize(zipBlob.size)}${pw ? ' · 🔒 암호 적용됨' : ''}`;

    setTimeout(() => {
      mainView.classList.add('hidden');
      successView.classList.remove('hidden');
      downloadBtn.onclick = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(zipBlob);
        a.download = zipName;
        a.click();
      };
    }, 400);

  } catch(e) {
    alert('오류 발생: ' + e.message);
    compressBtn.disabled = false;
    progressWrap.classList.add('hidden');
  }
});

resetBtn.addEventListener('click', () => {
  files = []; zipBlob = null;
  fileList.innerHTML = '';
  password.value = '';
  document.getElementById('zipName').value = 'archive';
  progressWrap.classList.add('hidden');
  compressBtn.disabled = true;
  successView.classList.add('hidden');
  mainView.classList.remove('hidden');
  ['b1','b2','b3','b4'].forEach(id => document.getElementById(id).style.background = '#e5e5ea');
  document.getElementById('strengthLabel').textContent = '';
});
</script>
</body>
</html>
